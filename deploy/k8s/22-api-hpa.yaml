# API horizontal autoscaler. CPU is a reasonable proxy for load on a
# Nest API serving JSON. For richer signals (request rate, p95 latency)
# add a Prometheus Adapter and switch to custom metrics.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: familia-api
  namespace: familia
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: familia-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      # React quickly to bursts (signups, post-launch traffic)
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      # Drain slowly to avoid flapping
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
