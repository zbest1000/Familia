# Pulls secrets from a SecretStore (AWS Secrets Manager / GCP Secret Manager
# / Vault) into a native Kubernetes Secret. Requires External Secrets Operator
# (https://external-secrets.io) installed in the cluster, and a SecretStore
# named `familia-secret-store` configured with credentials for your secret
# backend (not in this repo — backend-specific).
#
# Replace the `key` paths to match how your team names secrets in the backend.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: familia-secrets
  namespace: familia
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: familia-secret-store
    kind: SecretStore
  target:
    name: familia-secrets
    creationPolicy: Owner
  data:
    # Postgres (Neon connection string with sslmode=require)
    - secretKey: DATABASE_URL
      remoteRef:
        key: familia/prod/database-url
    # Redis (Upstash with rediss://)
    - secretKey: REDIS_URL
      remoteRef:
        key: familia/prod/redis-url
    # JWT signing key (HS256, 32+ random bytes base64)
    - secretKey: JWT_SECRET
      remoteRef:
        key: familia/prod/jwt-secret
    # S3 / object storage
    - secretKey: S3_REGION
      remoteRef:
        key: familia/prod/s3-region
    - secretKey: S3_BUCKET
      remoteRef:
        key: familia/prod/s3-bucket
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: familia/prod/aws-access-key-id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: familia/prod/aws-secret-access-key
    # SES email
    - secretKey: SES_REGION
      remoteRef:
        key: familia/prod/ses-region
    - secretKey: SES_FROM_ADDRESS
      remoteRef:
        key: familia/prod/ses-from-address
